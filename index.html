function getDate(){
  var now=new Date();
  var u5=new Date(now.getTime()-5*60*60*1000);
  var dias=["domingo","lunes","martes","miercoles","jueves","viernes","sabado"];

  return{
    full:dias[u5.getUTCDay()]+" "+u5.getUTCDate()+" de "+meses[u5.getUTCMonth()]+" de "+u5.getUTCFullYear(),
    short:u5.getUTCDate()+"/"+(u5.getUTCMonth()+1)+"/"+u5.getUTCFullYear(),
    year:u5.getUTCFullYear(),month:meses[u5.getUTCMonth()],
    hour:u5.getUTCHours()+":"+String(u5.getUTCMinutes()).padStart(2,"0"),
    iso:u5.getUTCFullYear()+"-"+String(u5.getUTCMonth()+1).padStart(2,"0")+"-"+String(u5.getUTCDate()).padStart(2,"0")

}

async function apiCall(key,sys,msg,model,maxT,useSearch){
  var m=model||"claude-sonnet-4-6";
  var mt=maxT||2000;
  var body={model:m,max_tokens:mt,system:sys,messages:[{role:"user",content:msg}]};
  if(useSearch)body.tools=[{type:"web_search_20250305",name:"web_search"}];
  var r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify(body)
  });
  if(!r.ok){var e=await r.json();throw new Error(e.error&&e.error.message||"Error de API")}
  var d=await r.json();
  return d.content.filter(function(b){return b.type==="text"}).map(function(b){return b.text}).join("");
}
