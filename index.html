<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c0f;--bg2:#111418;--bg3:#181d24;--bg4:#1e2530;

html,body,#root{height:100%;background:var(--bg);color:var(--txt);font-family:var(--fb)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}

.sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;padding:20px 12px}
.main{flex:1;overflow-y:auto;padding:28px 32px}
.logo{display:flex;align-items:center;gap:10px;padding:0 8px;margin-bottom:28px}
.lm{width:32px;height:32px;background:var(--acc);border-radius:8px;display:flex;align-items:center;justify-content:center}
.ln{font-family:var(--fn);font-size:20px;font-weight:800;color:var(--txt);letter-spacing:-.5px}

.ni{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r);cursor:pointer;transition:.15s;font-size:13px;color:var(--txt2);font-family:var(--fb);border:none;background:none;width:100%;text-align:left}
.ni:hover{background:var(--bg3);color:var(--txt)}

.nb{margin-left:auto;background:var(--acc);color:#000;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px}

.av{width:30px;height:30px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#000;flex-shrink:0}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:20px}
.ca{background:var(--acc3);border:1px solid var(--bd2);border-radius:var(--r2);padding:20px}
.cp{background:rgba(167,139,250,.06);border:1px solid rgba(167,139,250,.2);border-radius:var(--r2);padding:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

h1{font-family:var(--fn);font-size:22px;font-weight:700;color:var(--txt);letter-spacing:-.5px}

.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--r);border:none;cursor:pointer;font-family:var(--fb);font-size:13px;font-weight:500;transition:.15s}
.ba{background:var(--acc);color:#000}.ba:hover{background:var(--acc2)}
.bg{background:var(--bg3);color:var(--txt);border:1px solid var(--bd)}.bg:hover{border-color:var(--bd2);color:var(--acc)}
.bp{background:rgba(167,139,250,.15);color:var(--pur);border:1px solid rgba(167,139,250,.25)}.bp:hover{background:rgba(167,139,250,.25)}
.bdn{background:rgba(255,71,87,.1);color:var(--danger);border:1px solid rgba(255,71,87,.2)}
.sm{padding:6px 12px;font-size:12px}

input,select,textarea{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);color:var(--txt);font-family:var(--fb);font-size:13px;padding:9px 13px;width:100%;transition:.15s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--bd2)}
input::placeholder,textarea::placeholder{color:var(--txt3)}
select option{background:var(--bg3)}
textarea{resize:vertical;min-height:80px}
.fg{margin-bottom:14px}
.fl{font-size:12px;font-weight:500;color:var(--txt2);margin-bottom:6px;display:block}
.tw{display:flex;gap:4px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:3px}
.tb{padding:6px 14px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:var(--fb);transition:.15s;background:none;color:var(--txt2)}
.to{background:#1a3d2e;color:var(--acc)}.tp{background:#3d2a00;color:var(--warn)}
.bdg{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.b1{background:rgba(0,229,160,.12);color:var(--acc)}.b2{background:rgba(245,166,35,.12);color:var(--warn)}
.b3{background:rgba(79,195,247,.12);color:var(--info)}.b4{background:rgba(255,71,87,.12);color:var(--danger)}
.b5{background:var(--bg4);color:var(--txt2)}.b6{background:rgba(167,139,250,.12);color:var(--pur)}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
.dv{height:1px;background:var(--bd);margin:20px 0}
.sb{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r2);padding:20px;white-space:pre-wrap;font-size:13px;line-height:1.8;color:var(--txt);max-height:400px;overflow-y:auto}
.se{background:var(--bg4);border:1px solid var(--bd);border-radius:var(--r);padding:14px;font-size:12.5px;line-height:1.8;color:var(--txt2)}
.hi{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;font-size:13px;display:flex;gap:10px;cursor:pointer;transition:.15s}
.hi:hover{border-color:var(--bd2)}
.hn{font-family:var(--fn);font-size:11px;font-weight:700;color:var(--acc);min-width:20px}
@keyframes pu{0%,100%{opacity:.4}50%{opacity:1}}
.lb{height:3px;background:var(--acc);animation:pu 1.5s infinite;border-radius:2px;margin-bottom:12px}
.lp{height:3px;background:var(--pur);animation:pu 1.5s infinite;border-radius:2px;margin-bottom:12px}
.ow{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.oc{background:var(--bg2);border:1px solid var(--bd);border-radius:24px;padding:40px;max-width:560px;width:100%}
.ct{width:100%;border-collapse:collapse;font-size:13px}
.ct th{text-align:left;padding:8px 12px;color:var(--txt3);font-weight:500;font-size:11px;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--bd)}
.ct td{padding:10px 12px;border-bottom:1px solid var(--bd);color:var(--txt)}
.ct tr:last-child td{border-bottom:none}
.di{background:rgba(255,71,87,.05);border:1px solid rgba(255,71,87,.15);border-radius:var(--r);padding:14px;font-size:12px;color:var(--txt2);line-height:1.7;margin-top:16px}
.as{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--bd)}.as:last-child{border-bottom:none}
.sn{width:26px;height:26px;border-radius:50%;background:var(--acc);color:#000;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px}
.tabs{display:flex;gap:4px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:3px;margin-bottom:16px}
.tab{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:var(--fb);transition:.15s;background:none;color:var(--txt2)}
.tab.ac{background:var(--bg2);color:var(--acc);border:1px solid var(--bd2)}
.tg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.tgb{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:10px 8px;text-align:center;cursor:pointer;transition:.15s;font-size:11px;font-weight:500;color:var(--txt2);font-family:var(--fb)}
.tgb:hover{border-color:var(--bd2);color:var(--acc)}.tgb.ac{background:var(--acc3);border-color:var(--bd2);color:var(--acc)}
.tn{font-weight:700;font-size:12px;display:block;margin-bottom:2px}.td{font-size:9.5px;opacity:.7;display:block}
.mb{display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:10px 14px;margin-bottom:16px}
.mb.py{background:rgba(245,166,35,.05);border-color:rgba(245,166,35,.2)}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.cd{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:10px;min-height:80px;cursor:pointer;transition:.15s}
.cd:hover,.cd.td2{border-color:var(--acc)}
.cdn{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em}
.cdt{font-size:11px;color:var(--acc);font-weight:500;line-height:1.4;margin-top:6px}
.hd{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd)}.hd:last-child{border-bottom:none}
.hdd{width:6px;height:6px;border-radius:50%;background:var(--acc);flex-shrink:0}
.hdt{font-size:12px;color:var(--txt2);flex:1}.hdd2{font-size:10px;color:var(--txt3)}
.li{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:16px}
.ch{padding:3px 9px;border-radius:20px;font-size:11px;background:var(--bg4);color:var(--txt2);border:1px solid var(--bd)}
.mc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:18px}
.mv{font-family:var(--fn);font-size:24px;font-weight:700;margin:4px 0}
.up{color:var(--acc)}.dn{color:var(--danger)}
@keyframes su{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.nt{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);padding:12px 18px;font-size:13px;color:var(--acc);z-index:999;animation:su .25s ease}
.adv{border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.aw{background:rgba(0,229,160,.06);border:1px solid rgba(0,229,160,.15)}
.ai2{background:rgba(245,166,35,.06);border:1px solid rgba(245,166,35,.15)}
.ast{background:rgba(255,71,87,.06);border:1px solid rgba(255,71,87,.15)}
.ak{background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2)}
.at2{font-family:var(--fn);font-size:12px;font-weight:700;margin-bottom:6px}
.ab{font-size:12.5px;line-height:1.8;white-space:pre-wrap}
.aw .at2{color:var(--acc)}.aw .ab{color:rgba(0,229,160,.85)}
.ai2 .at2{color:var(--warn)}.ai2 .ab{color:rgba(245,166,35,.85)}
.ast .at2{color:var(--danger)}.ast .ab{color:rgba(255,71,87,.85)}
.ak .at2{color:var(--pur)}.ak .ab{color:rgba(167,139,250,.9)}
.bw{display:flex;align-items:flex-end;gap:6px;height:110px;padding-top:8px}
.bc{display:flex;flex-direction:column;align-items:center;flex:1;gap:3px;height:100%}
.bi2{width:100%;border-radius:4px 4px 0 0;min-height:3px;transition:.5s}
.bl{font-size:9px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center}
.bv{font-size:10px;color:var(--txt2);font-family:var(--fn)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
var R=React,RD=ReactDOM;
var useState=R.useState,useEffect=R.useEffect;
var E=R.createElement;

var INDS=["Trading & Finanzas","Fitness & Salud","Gastronomia & Food","Coaching personal","Moda & Lifestyle","Marketing Digital","Tecnologia & SaaS","Derecho & Consultoria","Bienes Raices","Educacion & Cursos","Belleza & Estetica","Fotografia & Diseno","Viajes & Turismo","Emprendimiento","Otro"];
var PLATS=["Instagram","TikTok","Ambas"];
var TECHS=[
  {id:"PAS",n:"PAS",d:"Problema-Agitacion-Solucion"},
  {id:"AIDA",n:"AIDA",d:"Atencion-Interes-Deseo-Accion"},
  {id:"BAB",n:"Before/After",d:"Antes-Despues-Puente"},
  {id:"4U",n:"4U",d:"Urgente Unico Util Especifico"},
  {id:"STORY",n:"Story Selling",d:"Historia que vende"},
  {id:"OBJ",n:"Objecion",d:"Rebate el mayor miedo"},
  {id:"START",n:"S.T.A.R.T",d:"Setup-Tension-Action-Result"},
  {id:"HOOK",n:"Hook Viral",d:"Gancho + CTA fulminante"},
];
var DAYS=["Lun","Mar","Mie","Jue","Vie","Sab","Dom"];
var DTOP=["Macro & Mercados","Herramientas practicas","Dia de marca","Mentalidad & errores","Analisis tecnico","Dia de marca 2","Finanzas personales"];
var NAV=[{id:"inicio",ic:"⚡",lb:"Inicio"},{id:"engine",ic:"✍️",lb:"Script Engine"},{id:"calendar",ic:"📅",lb:"Calendario"},{id:"client",ic:"👥",lb:"Client Mode"},{id:"library",ic:"📚",lb:"Biblioteca"},{id:"metrics",ic:"📊",lb:"Metricas"}];

function ls(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}}
function lss(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}

async function claude(key,sys,msg,search){
  var body={model:"claude-sonnet-4-20250514",max_tokens:3000,system:sys,messages:[{role:"user",content:msg}]};
  if(search)body.tools=[{type:"web_search_20250305",name:"web_search"}];
  var r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify(body)
  });
  if(!r.ok){var e=await r.json();throw new Error(e.error&&e.error.message||"Error de API")}
  var d=await r.json();
  return d.content.filter(function(b){return b.type==="text"}).map(function(b){return b.text}).join("\n");
}

function parseS(txt){
  function get(tag){var m=txt.match(new RegExp("\\["+tag+"\\]([\\s\\S]*?)\\[/"+tag+"\\]"));return m?m[1].trim():""}
  return{script:get("SCRIPT")||txt,ig:get("SEO_IG"),tt:get("SEO_TT")};
}

function BarChart(props){
  var data=props.data,key=props.dk,color=props.color,lk=props.lk;
  if(!data||data.length===0)return E("p",{className:"mu",style:{fontSize:12,padding:"16px 0"}},"Sin datos aun");
  var max=Math.max.apply(null,data.map(function(d){return d[key]||0}))||1;
  return E("div",{className:"bw"},data.map(function(d,i){
    var pct=((d[key]||0)/max*100);
    return E("div",{key:i,className:"bc"},
      E("span",{className:"bv"},d[key]?d[key].toLocaleString():"0"),
      E("div",{style:{flex:1,display:"flex",alignItems:"flex-end",width:"100%"}},
        E("div",{className:"bi2",style:{height:Math.max(pct,3)+"%",background:color,opacity:.85}})
      ),
      E("span",{className:"bl"},d[lk]||"")
    );
  }));
}

function LineChart(props){
  var data=props.data,key=props.dk,color=props.color,lk=props.lk;
  if(!data||data.length<2)return E("p",{className:"mu",style:{fontSize:12,padding:"16px 0"}},"Necesitas al menos 2 semanas de datos.");
  var vals=data.map(function(d){return d[key]||0});
  var max=Math.max.apply(null,vals)||1,min=Math.min.apply(null,vals);
  var W=400,H=100,pad=8;
  var pts=vals.map(function(v,i){
    return[pad+(i/(vals.length-1))*(W-pad*2),H-pad-((v-min)/(max-min||1))*(H-pad*2)];
  });
  var path="M"+pts.map(function(p){return p.join(",")}).join(" L");
  var area=path+" L"+pts[pts.length-1][0]+","+(H-pad)+" L"+pts[0][0]+","+(H-pad)+" Z";
  return E("svg",{viewBox:"0 0 "+W+" "+H,style:{width:"100%",height:120}},
    E("defs",null,E("linearGradient",{id:"g"+key,x1:"0",y1:"0",x2:"0",y2:"1"},
      E("stop",{offset:"0%",stopColor:color,stopOpacity:.3}),
      E("stop",{offset:"100%",stopColor:color,stopOpacity:0})
    )),
    E("path",{d:area,fill:"url(#g"+key+")"}),
    E("path",{d:path,fill:"none",stroke:color,strokeWidth:2,strokeLinejoin:"round"}),
    pts.map(function(pt,i){
      return E(R.Fragment,{key:i},
        E("circle",{cx:pt[0],cy:pt[1],r:3,fill:color}),
        E("text",{x:pt[0],y:H-1,textAnchor:"middle",fill:"#4a5568",fontSize:8},data[i][lk]?data[i][lk].toString().slice(0,6):"")
      );
    })
  );
}

// APP
function App(){
  var _k=useState(function(){return ls("clipo_key","")});
  var apiKey=_k[0],setApiKey=_k[1];
  var _p=useState(function(){return ls("clipo_profile",null)});
  var profile=_p[0],setProfile=_p[1];
  var _st=useState(function(){
    if(ls("clipo_key","")&&ls("clipo_profile",null))return 2;
    if(ls("clipo_key",""))return 1;
    return 0;
  });
  var step=_st[0],setStep=_st[1];
  var _n=useState("inicio");var nav=_n[0],setNav=_n[1];
  var _lb=useState(function(){return ls("clipo_lib",[])});var lib=_lb[0],setLib=_lb[1];
  var _h=useState(function(){return ls("clipo_hist",[])});var hist=_h[0],setHist=_h[1];
  var _ct=useState(function(){return ls("clipo_cal",DTOP.slice())});var cal=_ct[0],setCal=_ct[1];
  var _m=useState(function(){return ls("clipo_met",{ig:[],tt:[]})});var met=_m[0],setMet=_m[1];
  var _cl=useState(function(){return ls("clipo_cli",[])});var clients=_cl[0],setClients=_cl[1];
  var _nt=useState(null);var notif=_nt[0],setNotif=_nt[1];

  useEffect(function(){lss("clipo_lib",lib)},[lib]);
  useEffect(function(){lss("clipo_hist",hist)},[hist]);
  useEffect(function(){lss("clipo_cal",cal)},[cal]);
  useEffect(function(){lss("clipo_met",met)},[met]);
  useEffect(function(){lss("clipo_cli",clients)},[clients]);

  function toast(msg){setNotif(msg);setTimeout(function(){setNotif(null)},3000)}
  function saveLib(item){setLib(function(p){return [{...item,id:Date.now(),savedAt:new Date().toLocaleDateString()}].concat(p)});toast("Guardado en biblioteca")}
  function addHist(topic){setHist(function(p){return [{topic:topic,date:new Date().toLocaleDateString()}].concat(p.filter(function(t){return t.topic!==topic})).slice(0,30)})}

  if(step<2)return E(Onboard,{apiKey:apiKey,setApiKey:setApiKey,step:step,setStep:setStep,setProfile:setProfile});

  return E("div",{className:"app"},
    E("aside",{className:"sidebar"},
      E("div",{className:"logo"},
        E("div",{className:"lm"},E("svg",{viewBox:"0 0 24 24",fill:"#000",width:18,height:18},E("path",{d:"M13 2L3 14h9l-1 8 10-12h-9l1-8z"}))),
        E("span",{className:"ln"},"Cli",E("span",null,"po"))
      ),
      E("span",{className:"ns"},"Principal"),
      NAV.slice(0,3).map(function(n){
        return E("button",{key:n.id,className:"ni"+(nav===n.id?" a":""),onClick:function(){setNav(n.id)}},
          E("span",{style:{fontSize:15}},n.ic),n.lb,
          n.id==="library"&&lib.length>0?E("span",{className:"nb"},lib.length):null
        );
      }),
      E("span",{className:"ns"},"Herramientas"),
      NAV.slice(3).map(function(n){
        return E("button",{key:n.id,className:"ni"+(nav===n.id?" a":""),onClick:function(){setNav(n.id)}},
          E("span",{style:{fontSize:15}},n.ic),n.lb,
          n.id==="library"&&lib.length>0?E("span",{className:"nb"},lib.length):null
        );
      }),
      E("div",{className:"sf"},
        E("div",{style:{display:"flex",alignItems:"center",gap:8}},
          E("div",{className:"av"},profile&&profile.name?profile.name[0].toUpperCase():"U"),
          E("div",null,
            E("div",{style:{fontSize:12,fontWeight:500,color:"var(--txt)"}},profile&&profile.name||"Mi perfil"),
            E("div",{style:{fontSize:10,color:"var(--txt3)"}},profile&&profile.industry||"Creador")
          )
        )
      )
    ),
    E("main",{className:"main"},
      nav==="inicio"?E(PInicio,{profile:profile,apiKey:apiKey,cal:cal,hist:hist,addHist:addHist,saveLib:saveLib,toast:toast}):null,
